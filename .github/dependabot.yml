# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/" # Location of package manifests
    schedule:
      interval: "quarterly"
    groups:
      aws-sdk:
        patterns:
          - '@aws-sdk/*'
    ignore:
      # @actions/core has dropped support for CJS as of 3.0.0 https://github.com/actions/toolkit/blob/main/packages/core/RELEASES.md
      # adopting it requires a refactor of our project
      - dependency-name: "@actions/core"
        versions: [ ">=3.0.0" ]
      # @actions/github v7+ is ESM-only and incompatible with our ts-jest/CJS configuration
      - dependency-name: "@actions/github"
        versions: [ ">=7.0.0" ]
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'quarterly'
